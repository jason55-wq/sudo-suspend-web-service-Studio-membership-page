services:
  - type: web
    name: member-downloads
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      # Set DATABASE_URL in Render Dashboard to your existing Postgres connection string.
      - key: MEMBER_FILES_DIR
        value: /opt/render/project/src/data/member_files
    disk:
      name: member-files
      mountPath: /opt/render/project/src/data
      sizeGB: 1
