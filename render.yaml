services:
  - type: web
    name: member-downloads
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/data/member.db
      - key: MEMBER_FILES_DIR
        value: /opt/render/project/src/data/member_files
    disk:
      name: member-files
      mountPath: /opt/render/project/src/data
      sizeGB: 1
