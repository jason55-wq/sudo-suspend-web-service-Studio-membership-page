databases:
  - name: member-downloads-db
    databaseName: member_downloads
    user: member_downloads

services:
  - type: web
    name: member-downloads
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: member-downloads-db
          property: connectionString
      - key: MEMBER_FILES_DIR
        value: /opt/render/project/src/data/member_files
      - key: BASE_URL
        value: https://your-render-service.onrender.com
      - key: PAYMENT_PROVIDER
        value: ecpay
      - key: ECPAY_STAGE
        value: "1"
    disk:
      name: member-files
      mountPath: /opt/render/project/src/data
      sizeGB: 1
