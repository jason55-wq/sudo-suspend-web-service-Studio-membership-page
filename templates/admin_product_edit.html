{% extends "base.html" %}

{% block content %}
<section class="panel">
  <h1>{{ t("admin.product_edit.title") }}</h1>
  <p class="muted">{{ t("admin.product_edit.hint") }}</p>

  <form method="post" class="form">
    <label>{{ t("admin.product_edit.name") }}
      <input type="text" value="{{ product.name }}" disabled>
    </label>
    <label>{{ t("admin.product_edit.current_price") }}
      <input type="text" value="{{ product.price|currency }}" disabled>
    </label>
    <label>{{ t("admin.product_edit.new_price") }}
      <input type="number" name="price" min="0" step="1" value="{{ product.price }}" required>
    </label>
    <button class="btn primary" type="submit">{{ t("admin.product_edit.save") }}</button>
    <a class="btn" href="{{ url_for('admin_new_product') }}">{{ t("common.back") }}</a>
  </form>
</section>
{% endblock %}
