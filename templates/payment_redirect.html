{% extends "base.html" %}

{% block content %}
<section class="panel">
  <h1>付款處理中</h1>
  <p class="muted">系統正在把你導向金流頁面，請稍候。</p>

  <form id="payment-form" method="{{ payment.method }}" action="{{ payment.action }}">
    {% for key, value in payment.fields.items() %}
      <input type="hidden" name="{{ key }}" value="{{ value }}">
    {% endfor %}
    <noscript>
      <button class="btn primary" type="submit">前往付款</button>
    </noscript>
  </form>
</section>

<script>
  document.getElementById('payment-form').submit();
</script>
{% endblock %}
