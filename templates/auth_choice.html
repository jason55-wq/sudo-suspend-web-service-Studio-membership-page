{% extends "base.html" %}

{% block content %}
<section class="panel">
  <h1>{{ t("auth.choice_title") }}</h1>
  <p class="muted">{{ t("auth.choice_text") }}</p>
  <div class="actions">
    <a class="btn primary" href="{{ url_for('login', next=next_url) }}">{{ t("auth.login") }}</a>
    <a class="btn" href="{{ url_for('register', next=next_url) }}">{{ t("auth.register") }}</a>
  </div>
  <div class="auth-choice-notes">
    <p>{{ t("auth.choice_login_hint") }}</p>
    <p>{{ t("auth.choice_register_hint") }}</p>
  </div>
</section>
{% endblock %}
