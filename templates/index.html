{% extends "base.html" %}

{% block content %}
<section class="hero">
  <h1>{{ t("index.title") }}</h1>
  <p>{{ t("index.subtitle") }}</p>
  <p class="meta"><strong>{{ t("index.visit_count", count=visit_count) }}</strong></p>
  <div class="actions">
    <a class="btn primary" href="{{ url_for('register') }}">{{ t("auth.register") }}</a>
    <a class="btn" href="{{ url_for('login') }}">{{ t("auth.login") }}</a>
  </div>
</section>
{% endblock %}
